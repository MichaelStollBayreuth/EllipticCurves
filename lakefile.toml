name = "EllipticCurves"
defaultTargets = ["EllipticCurves"]

[leanOptions]
pp.unicode.fun = true
autoImplicit = false
relaxedAutoImplicit = false

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.32.0"

[[lean_lib]]
name = "EllipticCurves"
globs = ["EllipticCurves.+"]

# Comparator (https://github.com/leanprover/comparator) verification harness. Not part of
# `defaultTargets`, so a plain `lake build` ignores it (and never builds the deliberate `sorry`
# in `comparator/Challenge.lean`). See comparator/README.md.
[[lean_lib]]
name = "Challenge"
srcDir = "comparator"

[[lean_lib]]
name = "Solution"
srcDir = "comparator"
